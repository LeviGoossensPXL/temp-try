jobs:
  # Build job
  build:
    # <Not provided for brevity>
    # At a minimum this job should upload artifacts using actions/upload-pages-artifact

  # Deploy job
  deploy:
    # Add a dependency to the build job
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
                  - name: Upload GitHub Pages artifact
  uses: actions/upload-pages-artifact@v5.0.0
  with:
     - name: # optional, default is github-pages
      # Path of the directory containing the static assets.
       path: # default is _site/
      # Duration after which artifact will expire in days.
       retention-days: # optional, default is 1
    # Include hidden files and directories (those starting with a dot) in the artifact. Excludes .git and .github regardless.
       include-hidden-files: # optional, default is false
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # or specific "vX.X.X" version tag for this action
